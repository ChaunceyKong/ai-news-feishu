name: Manual News Push

on:
  workflow_dispatch:  # 允许手动触发
    inputs:
      dry-run:
        description: 'Dry run mode (no actual message sending)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      message-type:
        description: 'Message type'
        required: false
        default: 'mixed'
        type: choice
        options:
          - 'text'
          - 'card'
          - 'mixed'

  schedule:
    # 每天北京时间9点运行 (UTC+8 对应 UTC 1:00)
    - cron: '0 1 * * *'

jobs:
  push-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Configure environment
      run: |
        # 复制环境变量模板
        cp .env.example .env
        # 替换环境变量值
        sed -i "s|your_app_id_here|${{ secrets.LARK_APP_ID }}|g" .env
        sed -i "s|your_app_secret_here|${{ secrets.LARK_APP_SECRET }}|g" .env
        sed -i "s|ou_xxx|${{ secrets.LARK_RECEIVER_ID }}|g" .env
        # 根据输入设置运行模式
        if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
          sed -i "s|DRY_RUN=false|DRY_RUN=true|g" .env
        fi

    - name: Create data directory
      run: mkdir -p data

    - name: Cache news database
      uses: actions/cache@v3
      with:
        path: data/news.db
        key: news-db-${{ runner.os }}
        restore-keys: |
          news-db-${{ runner.os }}

    - name: Run news push
      env:
        # 传递GitHub Secrets作为环境变量
        LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
        LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        LARK_RECEIVER_ID: ${{ secrets.LARK_RECEIVER_ID }}
        # 设置Python路径
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        cd src
        # 构建命令行参数
        CMD_ARGS="run"
        if [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
          CMD_ARGS="$CMD_ARGS --dry-run"
        fi
        if [ -n "${{ github.event.inputs.message-type }}" ]; then
          CMD_ARGS="$CMD_ARGS --message-type ${{ github.event.inputs.message-type }}"
        fi
        # 运行新闻推送
        python main.py $CMD_ARGS

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: error-logs
        path: |
          data/*.log
          .env
        retention-days: 7