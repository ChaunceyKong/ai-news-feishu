# RSS源定义
# 所有RSS源已验证可用 (2026-03-25)

sources:
  # 英文AI资讯
  - name: "TechCrunch AI"
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    category: "AI"
    enabled: true
    max_articles: 10
    language: "en"
    description: "TechCrunch AI板块"

  - name: "The Verge AI"
    url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    category: "AI"
    enabled: true
    max_articles: 10
    language: "en"
    description: "The Verge AI板块"

  - name: "VentureBeat"
    url: "https://venturebeat.com/feed/"
    category: "AI"
    enabled: true
    max_articles: 10
    language: "en"
    description: "VentureBeat科技资讯（AI相关丰富）"

  - name: "Wired AI"
    url: "https://www.wired.com/feed/tag/ai/latest/rss"
    category: "AI"
    enabled: true
    max_articles: 10
    language: "en"
    description: "Wired AI标签文章"

  - name: "The Decoder"
    url: "https://the-decoder.com/feed/"
    category: "AI"
    enabled: true
    max_articles: 10
    language: "en"
    description: "专注AI新闻的科技媒体"

  # 中文AI资讯
  - name: "36氪"
    url: "https://36kr.com/feed"
    category: "Tech"
    enabled: true
    max_articles: 15
    language: "zh"
    description: "36氪科技创业资讯（AI相关内容丰富）"

  - name: "Readhub"
    url: "https://readhub.cn/rss"
    category: "Tech"
    enabled: true
    max_articles: 10
    language: "zh"
    description: "每日科技资讯聚合"

# 分类定义
categories:
  AI:
    name: "人工智能"
    priority: 1
    enabled: true

  Tech:
    name: "科技"
    priority: 2
    enabled: true

# 全局设置
global:
  default_max_articles: 10
  default_timeout: 10
  user_agent: "AI-News-Feishu-Bot/1.0"
